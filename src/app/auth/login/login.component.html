<div class="login-wrapper">
  <div class="login-card">
    <h2>Login</h2>

    @if (erro()) {
      <div class="alert-erro">{{ erro() }}</div>
    }

    <form (ngSubmit)="entrar()">
      <div class="field">
        <label for="email">E-mail</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder="admin@admin.com"
          autocomplete="username"
        />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="current-password"
        />
      </div>

      <button type="submit" [disabled]="carregando()">
        {{ carregando() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>
  </div>
</div>

<style>
  .login-wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #f5f5f5;
  }
  .login-card {
    background: #fff;
    padding: 2rem;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,.1);
    width: 100%;
    max-width: 360px;
  }
  h2 { margin: 0 0 1.5rem; font-size: 1.5rem; }
  .field { display: flex; flex-direction: column; margin-bottom: 1rem; }
  label { font-size: .85rem; margin-bottom: .35rem; color: #555; }
  input {
    padding: .6rem .8rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 1rem;
  }
  button {
    width: 100%;
    padding: .7rem;
    background: #1976d2;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-size: 1rem;
    cursor: pointer;
    margin-top: .5rem;
  }
  button:disabled { background: #90bce8; cursor: not-allowed; }
  .alert-erro {
    background: #fdecea;
    color: #c62828;
    padding: .6rem .8rem;
    border-radius: 4px;
    margin-bottom: 1rem;
    font-size: .9rem;
  }
</style>
